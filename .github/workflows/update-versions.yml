name: Update Version Defaults

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fetch and update version defaults
        run: |
          chmod +x ./gradlew
          ./gradlew updateVersions

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/main/kotlin/coffee/axle/blahaj/data/VersionInfo.kt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/kotlin/coffee/axle/blahaj/data/VersionInfo.kt
          git commit -m "chore: update version defaults from upstream"
          git push
